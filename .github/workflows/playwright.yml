name: Playwright E2E Tests

on:
  push:
    branches: [ main, dev ]
  pull_request:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    # Required so peaceiris/actions-gh-pages can push to the gh-pages branch
    permissions:
      contents: write

    steps:
      # 1️⃣ Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3️⃣ Dependencies
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Browsers
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # 5️⃣ Run tests — outputs native HTML report + JSON (JSON is what we need)
      - name: Run Playwright Tests
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: playwright-report/report.json
        run: npx playwright test --reporter=html,json
        continue-on-error: true   # don't abort the job on failures; we still want the report

      # 6️⃣ Generate the custom dashboard from the JSON output
      - name: Generate custom dashboard
        run: |
          node generate-dashboard.mjs \
            --json      ./playwright-report/report.json \
            --html      ./playwright-report/dashboard.html \
            --template  ./reporter-template.html

      # 7️⃣ Upload the full report folder as a downloadable artifact
      - name: Upload reports as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # 8️⃣ Deploy to GitHub Pages (main branch only)
      #    Custom dashboard: https://<user>.github.io/<repo>/dashboard.html
      #    Native report:    https://<user>.github.io/<repo>/index.html
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report
          # Keeps the gh-pages branch history clean (single orphan commit)
          force_orphan: true

      # 9️⃣ Fail the job AFTER publishing the report if any tests failed
      - name: Check test results
        run: |
          if [ -f ./playwright-report/report.json ]; then
            UNEXPECTED=$(node -e "
              const r = JSON.parse(require('fs').readFileSync('./playwright-report/report.json'));
              console.log(r.stats?.unexpected ?? 0);
            ")
            if [ "$UNEXPECTED" -gt "0" ]; then
              echo "❌ $UNEXPECTED test(s) failed"
              exit 1
            fi
          fi

      # 🔟 Push report to QA Hub so the combined dashboard picks it up
      - name: Push report to QA Hub
        if: always()
        env:
          HUB_TOKEN: ${{ secrets.HUB_TOKEN }}
          HUB_REPO: Defused15/test-hub
          PROJECT_NAME: QA-Playground-Tests
        run: |
          REPORT_PATH="./playwright-report/report.json"

          if [ ! -f "$REPORT_PATH" ]; then
            echo "⚠️  report.json not found, skipping hub upload"
            exit 0
          fi

          CONTENT=$(base64 -w 0 "$REPORT_PATH")

          API_URL="https://api.github.com/repos/${HUB_REPO}/contents/projects/${PROJECT_NAME}/latest.json"

          EXISTING=$(curl -s -H "Authorization: Bearer ${HUB_TOKEN}" \
                             -H "Accept: application/vnd.github+json" \
                             "$API_URL")

          SHA=$(echo "$EXISTING" | node -e "
            let d=''; process.stdin.on('data',c=>d+=c);
            process.stdin.on('end',()=>{
              try { const j=JSON.parse(d); console.log(j.sha||''); }
              catch { console.log(''); }
            });
          ")

          if [ -n "$SHA" ]; then
            PAYLOAD=$(node -e "
              console.log(JSON.stringify({
                message: 'chore: update ${PROJECT_NAME} report [skip ci]',
                content: process.env.CONTENT,
                sha: process.env.SHA
              }));
            " SHA="$SHA" CONTENT="$CONTENT")
          else
            PAYLOAD=$(node -e "
              console.log(JSON.stringify({
                message: 'chore: add ${PROJECT_NAME} report [skip ci]',
                content: process.env.CONTENT
              }));
            " CONTENT="$CONTENT")
          fi

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X PUT \
            -H "Authorization: Bearer ${HUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$API_URL")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
            echo "✅  Report pushed to hub (HTTP $HTTP_CODE)"
          else
            echo "❌  Failed to push report (HTTP $HTTP_CODE)"
            echo "$RESPONSE" | head -1
            exit 1
          fi