name: Playwright E2E Tests

on:
  push:
    branches: [ main, dev ]
  pull_request:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    # Required so peaceiris/actions-gh-pages can push to the gh-pages branch
    permissions:
      contents: write

    steps:
      # 1️⃣ Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3️⃣ Dependencies
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Browsers
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # 5️⃣ Run tests — outputs native HTML report + JSON (JSON is what we need)
      - name: Run Playwright Tests
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: playwright-report/report.json
        run: npx playwright test --reporter=html,json
        continue-on-error: true   # don't abort the job on failures; we still want the report

      # 6️⃣ Generate the custom dashboard from the JSON output
      - name: Generate custom dashboard
        run: |
          node generate-dashboard.mjs \
            --json      ./playwright-report/report.json \
            --html      ./playwright-report/dashboard.html \
            --template  ./reporter-template.html

      # 7️⃣ Upload the full report folder as a downloadable artifact
      - name: Upload reports as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # 8️⃣ Deploy to GitHub Pages (main branch only)
      #    Custom dashboard: https://<user>.github.io/<repo>/dashboard.html
      #    Native report:    https://<user>.github.io/<repo>/index.html
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report
          # Keeps the gh-pages branch history clean (single orphan commit)
          force_orphan: true

      # 9️⃣ Fail the job AFTER publishing the report if any tests failed
      - name: Check test results
        run: |
          if [ -f ./playwright-report/report.json ]; then
            UNEXPECTED=$(node -e "
              const r = JSON.parse(require('fs').readFileSync('./playwright-report/report.json'));
              console.log(r.stats?.unexpected ?? 0);
            ")
            if [ "$UNEXPECTED" -gt "0" ]; then
              echo "❌ $UNEXPECTED test(s) failed"
              exit 1
            fi
          fi

      # 🔟 Push report to QA Hub so the combined dashboard picks it up
      - name: Push report to QA Hub
        if: always()
        env:
          HUB_TOKEN: ${{ secrets.HUB_TOKEN }}
          HUB_REPO: Defused15/test-hub
          PROJECT_NAME: QA-Playground-Tests
        run: |
          node -e "
            const fs = require('fs');
            const https = require('https');

            const reportPath = './playwright-report/report.json';
            if (!fs.existsSync(reportPath)) {
              console.log('⚠️  report.json not found, skipping');
              process.exit(0);
            }

            const content = fs.readFileSync(reportPath).toString('base64');
            const token   = process.env.HUB_TOKEN;
            const repo    = process.env.HUB_REPO;
            const project = process.env.PROJECT_NAME;
            const apiPath = '/repos/' + repo + '/contents/projects/' + project + '/latest.json';

            const options = {
              hostname: 'api.github.com',
              path: apiPath,
              method: 'GET',
              headers: {
                'Authorization': 'Bearer ' + token,
                'Accept': 'application/vnd.github+json',
                'User-Agent': 'qa-hub'
              }
            };

            const req = https.request(options, res => {
              let data = '';
              res.on('data', c => data += c);
              res.on('end', () => {
                let sha = '';
                try { sha = JSON.parse(data).sha || ''; } catch {}

                const body = JSON.stringify({
                  message: 'chore: update ' + project + ' report',
                  content,
                  ...(sha ? { sha } : {})
                });

                const put = https.request({
                  hostname: 'api.github.com',
                  path: apiPath,
                  method: 'PUT',
                  headers: {
                    'Authorization': 'Bearer ' + token,
                    'Accept': 'application/vnd.github+json',
                    'User-Agent': 'qa-hub',
                    'Content-Type': 'application/json',
                    'Content-Length': Buffer.byteLength(body)
                  }
                }, r => {
                  let out = '';
                  r.on('data', c => out += c);
                  r.on('end', () => {
                    if (r.statusCode === 200 || r.statusCode === 201) {
                      console.log('✅  Report pushed to hub (HTTP ' + r.statusCode + ')');
                    } else {
                      console.error('❌  Failed (HTTP ' + r.statusCode + ')');
                      console.error(out);
                      process.exit(1);
                    }
                  });
                });
                put.write(body);
                put.end();
              });
            });
            req.end();
          "